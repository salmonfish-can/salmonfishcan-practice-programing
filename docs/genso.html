<!DOCTYPE html>
<html lang=ja>
<head>
    <meta charset="UTF-8">
    <title>元素</title>
    <style>
        body {background-color:darkcyan}
    </style>
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <input type="button" value="記号で出題" id="kigou">
    <input type="button" value="名前で出題" id="namae">
    <input type="text" placeholder="出題数" id="num">
    <input type="text" placeholder="出題範囲（数字で！）" id="saitei">
    <span>～</span>
    <input type="text" placeholder="出題範囲（数字で！）" id="saikou">
    <span>順番でやるか</span>
    <input type="checkbox" id="zyunban">
    <div style="text-align:center">
        <p id="disp">問題</p>
        <p id="yesno"></p>
        <p id="zatuyou"></p>
        <p id="dispnum"></p>
        <input type="text" id="answer" placeholder="解答を入力...">
        <input type="button" id="confirm" value="解答！">
    </div>
    <script>
        const kigou = document.getElementById('kigou')
        const namae = document.getElementById('namae')
        const saitei = document.getElementById('saitei')
        const saikou = document.getElementById('saikou')
        const zyunban = document.getElementById('zyunban')
        const disp = document.getElementById('disp')
        const answer = document.getElementById('answer')
        const yesno = document.getElementById('yesno')
        const confirm = document.getElementById('confirm')
        const num = document.getElementById('num')
        const zatuyou = document.getElementById('zatuyou')
        const dispnum = document.getElementById('dispnum')
        let type = "none"
        let min = 0
        let max = 0
        let res = 0
        let ques = 0
        let ans = 0
        let quesnum = 0
        let maxnum = 0
        let w = []
        const kigouitiran = [
            null,
            'H','He','Li','Be','B','C','N','O','F','Ne',
            'Na','Mg','Al','Si','P','S','Cl','Ar','K','Ca',
            'Sc','Ti','V','Cr','Mn','Fe','Co','Ni','Cu','Zn',
            'Ga','Ge','As','Se','Br','Kr','Rb','Sr','Y','Zr',
            'Nb','Mo','Tc','Ru','Rh','Pd','Ag','Cd','In','Sn',
            'Sb','Te','I','Xe','Cs','Ba','La','Ce','Pr','Nd',
            'Pm','Sm','Eu','Gd','Tb','Dy','Ho','Er','Tm','Yb',
            'Lu','Hf','Ta','W','Re','Os','Ir','Pt','Au','Hg',
            'Tl','Pb','Bi','Po','At','Rn','Fr','Ra','Ac','Th',
            'Pa','U','Np','Pu','Am','Cm','Bk','Cf','Es','Fm',
            'Md','No','Lr','Rf','Db','Sg','Bh','Hs','Mt','Ds',
            'Rg','Cn','Nh','Fl','Mc','Lv','Ts','Og'
        ]
        const namaeitiran = [
            null,
            '水素','ヘリウム','リチウム','ベリリウム','ホウ素','炭素','窒素','酸素','フッ素','ネオン',
            'ナトリウム','マグネシウム','アルミニウム','ケイ素','リン','硫黄','塩素','アルゴン','カリウム','カルシウム',
            'スカンジウム','チタン','バナジウム','クロム','マンガン','鉄','コバルト','ニッケル','銅','亜鉛',
            'ガリウム','ゲルマニウム','ヒ素','セレン','臭素','クリプトン','ルビジウム','ストロンチウム','イットリウム','ジルコニウム',
            'ニオブ','モリブデン','テクネチウム','ルテニウム','ロジウム','パラジウム','銀','カドミウム','インジウム','スズ',
            'アンチモン','テルル','ヨウ素','キセノン','セシウム','バリウム','ランタン','セリウム','プラセオジム','ネオジム',
            'プロメチウム','サマリウム','ユウロピウム','ガドリニウム','テルビウム','ジスプロシウム','ホルミウム','エルビウム','ツリウム','イッテルビウム',
            'ルテチウム','ハフニウム','タンタル','タングステン','レニウム','オスミウム','イリジウム','白金','金','水銀',
            'タリウム','鉛','ビスマス','ポロニウム','アスタチン','ラドン','フランシウム','ラジウム','アクチニウム','トリウム',
            'プロトアクチニウム','ウラン','ネプツニウム','プルトニウム','アメリシウム','キュリウム','バークリウム','カリホルニウム','アインスタイニウム','フェルミウム',
            'メンデレビウム','ノーベリウム','ローレンシウム','ラザホージウム','ドブニウム','シーボーギウム','ボーリウム','ハッシウム','マイトネリウム','ダームスタチウム',
            'レントゲニウム','コペルニシウム','ニホニウム','フレロビウム','モスコビウム','リバモリウム','テネシン','オガネソン'
        ]
        function reset(){
            min = 0
            max = 0
            type ="none"
            ques = 0
            ans = 0
            quesnum = 0
            maxnum = 0
            w = []
            dispnum.textContent = ""
        }
        function generate(min,max,type){
            const rand = Math.floor(Math.random() * (max - min + 1)) + min
            let res1 = kigouitiran[rand]
            let res2 = namaeitiran[rand]
            let result = [res1,res2]
            const size = max - min + 1
            if(w.length == size){
                w.length = 0
            }
            if(w.includes(res1) && w.length != size){
                return generate(min,max,type)
            }
            w.push(res1)
            return(result)
        }
        function fkigou(){
            min = Number(saitei.value)
            max = Number(saikou.value)
            if(min == 0){
                min = 1
            }
            if(max == 0){
                max = 118
            }
            if(quesnum > maxnum){
                zatuyou.textContent = "お疲れさまでした！"
                disp.textContent = ""
                reset()
                return
            }
            res = generate(min,max,"kigou")
            ques = res[0]
            ans = res[1]
            disp.textContent = ques
        }
        function fnamae(){
            min = Number(saitei.value)
            max = Number(saikou.value)
            if(min == 0){
                min = 1
            }
            if(max == 0){
                max = 118
            }
            if(quesnum > maxnum){
                zatuyou.textContent = "お疲れさまでした！"
                disp.textContent = ""
                reset()
                return
            }
            res = generate(min,max,"kigou")
            ques = res[1]
            ans = res[0]
            disp.textContent = ques
        }
        kigou.addEventListener('click', () => {
            zatuyou.textContent = ""
            yesno.textContent = ""
            dispnum.textContent = 1 + "問目"
            quesnum += 1
            maxnum = Number(num.value)
            if(maxnum == 0){
                maxnum = 10
            }
            type = "kigou"
            fkigou()
        })
        namae.addEventListener('click', () => {
            zatuyou.textContent = ""
            yesno.textContent = ""
            dispnum.textContent = 1 + "問目"
            quesnum += 1
            maxnum = Number(num.value)
            if(maxnum == 0){
                maxnum = 10
            }
            type = "namae"
            fnamae()
        })
        confirm.addEventListener('click', () => {
            const cv = answer.value
            if(maxnum == 0){
                zatuyou.textContent = "モードを選んでから初めてください"
                return
            }
            if(cv == ans){
                yesno.textContent = '正解！'
            }
            else{
                yesno.textContent = '不正解...  正しい回答は  ' + ans
            }
            answer.value = ""
            quesnum += 1
            dispnum.textContent = quesnum + "問目"
            if(type == "kigou"){
                fkigou()
            }
            else{
                fnamae()
            }
        })
    </script>
</body>
