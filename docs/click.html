<!DOCTYPE html>
<html lang=ja>
<head>
    <meta charset="UTF-8">
    <title>クリックするやつ</title>
    <style>
        body {background-color:darkcyan}
    </style>
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <noscript>javascriptが無効になっているようです...このページはjavascriptを使っているためまともに動きません...</noscript>
    <h1>クリックするやつです</h1>
    <p id = "control"></p>
    <p>
    <span id = "number">0</span> 
    <span>現在の数値</span>
    </p>
    <p>
    <span id = "inc">1</span>
    <span>押したらこれだけ増えるよ</span>
    </p>
    <p>
    <span id ="incps">0</span>
    <span>一秒間に増える数</span>
    </p>
    <input type="button" id = "click" value = "クリック！">
    <p>一回のクリックでもらえる数を増やす</p>
    <p>
        <input type="button" id="boost1" value = "3ふやす">
        <span>価格:</span>
        <span id = "cost1">400</span>
    </p>
    <p>
    <input type="button" id="boost2" value = "20ふやす">
    <span>価格:</span>
    <span id = "cost2">1000</span>
    </p>
    <p>
    <input type="button" id="boost3" value = "50ふやす">
    <span>価格:</span>
    <span id = "cost3">2000</span>
    </p>
    <input type="button" id="boost4" value = "300ふやす">
    <span>価格:</span>
    <span id = "cost4">10000</span>
    </p>
    <p>一秒間にもらえる数を増やす</p>
    <p>
    <input type="button" id="boost1ps" value = "1ふやす">
    <span>価格:</span>
    <span id = "cost1ps">100</span>
    </p>
    <p>
    <input type="button" id="boost2ps" value = "5ふやす">
    <span>価格:</span>
    <span id = "cost2ps">1000</span>
    </p>
    <script>
        const control = document.getElementById('control')
        let expl = ("")
        const dispincps = document.getElementById('incps')
        const dispnumber = document.getElementById('number')
        const dispinc = document.getElementById('inc')
        const click = document.getElementById('click')
        const boost1 = document.getElementById('boost1')
        const boost2 = document.getElementById('boost2')
        const boost3 = document.getElementById('boost3')
        const boost4 = document.getElementById('boost4')
        const boost1ps = document.getElementById('boost1ps')
        const boost2ps = document.getElementById('boost2ps')
        const dispcost1 = document.getElementById('cost1')
        const dispcost2 = document.getElementById('cost2')
        const dispcost3 = document.getElementById('cost3')
        const dispcost4 = document.getElementById('cost4')
        const dispcost1ps = document.getElementById('cost1ps')
        const dispcost2ps = document.getElementById('cost2ps')
        let buttonnumber = 0
        let number = 0
        let inc = 1
        let incps = 0
        let cost1 = 400
        let cost2 = 1000
        let cost3 = 2000
        let cost4 = 10000
        let cost1ps = 100
        let cost2ps = 1000
        let res = 0
        function onceinc({number,inc,buttonnumber,cost}){
            let temp = 0;
            if(buttonnumber == 1 && number >= cost){
                return({newnumber: number - cost,
                    newinc: inc + 3,
                    newcost: cost * 1.6
                })
            }
            if(buttonnumber == 2 && number >= cost){
                return({newnumber: number - cost,
                    newinc: inc + 20,
                    newcost: cost * 1.5
                })
            }
            if(buttonnumber == 3 && number >= cost){
                return({newnumber: number - cost,
                    newinc: inc + 50,
                    newcost: cost * 1.6
                })
            }
            if(buttonnumber == 4 && number >= cost){
                return({newnumber: number - cost,
                    newinc: inc + 300,
                    newcost: cost * 1.6
                })
            }
        }
        function psinc({number,incps,buttonnumber,cost}){
            if(buttonnumber == 1 && number >= cost){
                return({newnumber: number - cost,
                    newincps: incps + 1,
                    newcost: cost * 1.3
                })
            }
            if(buttonnumber == 2 && number >= cost){
                return({newnumber: number - cost,
                    newincps: incps + 5,
                    newcost: cost * 1.3
                })
            }
        }
        click.addEventListener('pointerdown', () => {
            number += inc
            dispnumber.textContent = number
            expl = null
            control.textContent = expl
        })
        function renew(cost){
            dispnumber.textContent = number
            dispinc.textContent = inc
            if(buttonnumber == 1){
                dispcost1.textContent = cost
            }
            if(buttonnumber == 2){
                dispcost2.textContent = cost
            }
            if(buttonnumber == 3){
                dispcost3.textContent = cost
            }
            if(buttonnumber == 4){
                dispcost4.textContent = cost
            }
        }
        function renewps(cost){
            dispnumber.textContent = number
            dispincps.textContent = incps
            if(buttonnumber == 1){
                dispcost1ps.textContent = cost
            }
            if(buttonnumber == 2){
                dispcost2ps.textContent = cost
            }
        }
        boost1.addEventListener('click', () => {
            buttonnumber = 1
            res = onceinc({number: number,
                inc: inc,
                buttonnumber: buttonnumber,
                cost:  cost1
            })
            if(res !== undefined){
                number = Math.floor(res.newnumber)
                inc = Math.floor(res.newinc)
                cost1 = Math.floor(res.newcost)
                renew(cost1)
            }
            else{
                expl = ("お金がたりません")
                control.textContent = expl
            }
        })
        boost2.addEventListener('click', () => {
            buttonnumber = 2
            res = onceinc({number: number,
                inc: inc,
                buttonnumber: buttonnumber,
                cost:  cost2
            })
            if(res !== undefined){
                number = Math.floor(res.newnumber)
                inc = Math.floor(res.newinc)
                cost2 = Math.floor(res.newcost)
                renew(cost2)
            }
            else{
                expl = ("お金がたりません")
                control.textContent = expl
            }
        })
        boost3.addEventListener('click', () => {
            buttonnumber = 3
            res = onceinc({number: number,
                inc: inc,
                buttonnumber: buttonnumber,
                cost:  cost3
            })
            if(res !== undefined){
                number = Math.floor(res.newnumber)
                inc = Math.floor(res.newinc)
                cost3 = Math.floor(res.newcost)
                renew(cost3)
            }
            else{
                expl = ("お金がたりません")
                control.textContent = expl
            }
        })
        boost4.addEventListener('click', () => {
            buttonnumber = 4
            res = onceinc({number: number,
                inc: inc,
                buttonnumber: buttonnumber,
                cost:  cost4
            })
            if(res !== undefined){
                number = Math.floor(res.newnumber)
                inc = Math.floor(res.newinc)
                cost4 = Math.floor(res.newcost)
                renew(cost4)
            }
            else{
                expl = ("お金がたりません")
                control.textContent = expl
            }
        })
        boost1ps.addEventListener('click', () => {
            buttonnumber = 1
            res = psinc({number: number,
                incps: incps,
                buttonnumber: buttonnumber,
                cost:  cost1ps
            })
            if(res !== undefined){
                number = Math.floor(res.newnumber)
                incps = Math.floor(res.newincps)
                cost1ps = Math.floor(res.newcost)
                renewps(cost1ps)
            }
            else{
                expl = ("お金がたりません")
                control.textContent = expl
            }
        })
        boost2ps.addEventListener('click', () => {
            buttonnumber = 2
            res = psinc({number: number,
                incps: incps,
                buttonnumber: buttonnumber,
                cost:  cost2ps
            })
            if(res !== undefined){
                number = Math.floor(res.newnumber)
                incps = Math.floor(res.newincps)
                cost2ps = Math.floor(res.newcost)
                renewps(cost2ps)
            }
            else{
                expl = ("お金がたりません")
                control.textContent = expl
            }
        })
        setInterval(() => {
            number += incps
            dispnumber.textContent = number
        }, 1000);
    </script>
</body>
