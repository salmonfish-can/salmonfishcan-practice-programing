<!DOCTYPE html>
<html lang=ja>
<head>
    <meta charset="UTF-8">
    <title>暗算の練習</title>
    <style>
        body {background-color:darkcyan}
    </style>
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <h1>暗算の練習</h1>
    <noscript>javascriptが無効になっているようです...このページはjavascriptを使っているためまともに動きません...</noscript>
    <span>
        <input type="button" id = "digit3plus" value = "3桁足し算">
        <input type="button" id = "digit4plus" value = "4桁足し算">
        <input type="button" id = "digit5plus" value = "5桁足し算">
        <input type="button" id = "digit6plus" value = "6桁足し算">
        <input type="button" id = "digit3plus10" value = "3桁足し算10回">
    </span>
        <div style="text-align:center">
        <p>
        <span id = "num1"></span>
        <span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        <span id = "sign"></span>
        <span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
        <span id = "num2"></span>
        </p>
        <p>
            <input type="text" id ="useranswer" placeholder="ここに解答を入力(半角で!)">
            <input type="button" id = "answerbutton" value="解答">
        </p>
        <p id = "correct"></p>
        <p id = "whatques"></p>
    </div>
    <script>
        const num1 = document.getElementById('num1')
        const num2 = document.getElementById('num2')
        const sign = document.getElementById('sign')
        const usercontent = document.getElementById('useranswer')
        const answerbutton = document.getElementById('answerbutton')
        const correct = document.getElementById('correct')
        const whatques = document.getElementById('whatques')
        const digit3plus = document.getElementById('digit3plus')
        const digit4plus = document.getElementById('digit4plus')
        const digit5plus = document.getElementById('digit5plus')
        const digit6plus = document.getElementById('digit6plus')
        const digit3plus10 = document.getElementById('digit3plus10')
        let answer = 0
        let challenge = 0
        let challengenumber = 0
        let min = 0
        let max = 0
        let i = 0
        let m = 0
        let quesnum = 0
        let correctnum = 0
        let res = 0
        function generate(min,max){
            res = Math.floor(Math.random() * (max - min + 1)) + min
            return(res)
        }
        function reset(){
            answer = 0
            min = 0
            max = 0
            i = 0
            m = 0
        }
        digit3plus.addEventListener('click', () => {
            if(challenge == 1){
                correct.textContent = ('連続して問題をやっている時に他の問題に移る事はできません！')
                return;
            }
            correct.textContent = ('')
            min = 100
            max = 999
            i = generate(min,max)
            m = generate(min,max)
            answer = i + m
            sign.textContent = ('+')
            num1.textContent = i
            num2.textContent = m
        })
        digit4plus.addEventListener('click', () => {
            if(challenge == 1){
                correct.textContent = ('連続して問題をやっている時に他の問題に移る事はできません！')
                return;
            }
            correct.textContent = ('')
            min = 1000
            max = 9999
            i = generate(min,max)
            m = generate(min,max)
            answer = i + m
            sign.textContent = ('+')
            num1.textContent = i
            num2.textContent = m
        })
        digit5plus.addEventListener('click', () => {
            if(challenge == 1){
                correct.textContent = ('連続して問題をやっている時に他の問題に移る事はできません！')
                return;
            }
            correct.textContent = ('')
            min = 10000
            max = 99999
            i = generate(min,max)
            m = generate(min,max)
            answer = i + m
            sign.textContent = ('+')
            num1.textContent = i
            num2.textContent = m
        })
        digit6plus.addEventListener('click', () => {
            if(challenge == 1){
                correct.textContent = ('連続して問題をやっている時に他の問題に移る事はできません！')
                return;
            }
            correct.textContent = ('')
            min = 100000
            max = 999999
            i = generate(min,max)
            m = generate(min,max)
            answer = i + m
            sign.textContent = ('+')
            num1.textContent = i
            num2.textContent = m
        })
        function digit3plus10f(){
            if(quesnum == 10){
                correct.textContent = ('あなたの正解数は...') + correctnum + ('問です！')
                quesnum = 0
                correctnum = 0
                challengenumber = 0
                challenge = 0
                return;
            }
            whatques.textContent = ('今の問題数') + (quesnum + 1)
            min = 100
            max = 999
            i = generate(min,max)
            m = generate(min,max)
            answer = i + m
            sign.textContent = ('+')
            num1.textContent = i
            num2.textContent = m
        }
        digit3plus10.addEventListener('click', () => {
            challenge = 1
            challengenumber = 1
            digit3plus10f()

        })
        answerbutton.addEventListener('click', () => {
            if(answer == 0){
                correct.textContent = ('問題を選んでから解答してください！')
                num1.textContent = ('')
                num2.textContent = ('')
                sign.textContent = ('')
                return;
            }
        const useranswer = usercontent.value
            if(useranswer == answer){
                correct.textContent = ('正解！')
                if(challenge == 1){
                    correctnum += 1
                    quesnum += 1
                }
            }
            else{
                if(challenge == 1){
                    quesnum += 1
                }
                correct.textContent = ('不正解...正しい回答は    ' + answer)
            }
            reset()
            if(challengenumber == 1){
                digit3plus10f()
            }
            
        })
    </script>
</body>
